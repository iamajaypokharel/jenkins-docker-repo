name: Deploy Todo App

on:
  push:
    branches:
      - main

env:
  APP_IP: ${{ secrets.APP_IP }}
  DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}
  COMPOSE: ${{ secrets.COMPOSE }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Validate Backend
        run: |
          cd backend
          python3 -m py_compile $(find src -name "*.py")

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.APP_SERVER_SSH_KEY }}

      - name: Add Host Key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $APP_IP >> ~/.ssh/known_hosts

      - name: Test SSH Connection
        run: |
          ssh -v $APP_IP "echo SSH Connected"

      - name: Create Deployment Directory
        run: |
          ssh $APP_IP "mkdir -p $DEPLOY_DIR"

      - name: Copy Project
        run: |
          rsync -avz --delete \
            --exclude=".git" \
            --exclude="venv" \
            --exclude="postgres_data" \
            ./ $APP_IP:$DEPLOY_DIR/

      - name: Upload .env
        run: |
          echo "${{ secrets.TODO_ENV }}" > .env
          scp .env $APP_IP:$DEPLOY_DIR/.env
          rm .env

      - name: Deploy
        run: |
          ssh $APP_IP "
            cd $DEPLOY_DIR &&
            $COMPOSE down --remove-orphans &&
            $COMPOSE up -d --build &&
            docker ps
          "

      - name: Health Check
        run: |
          sleep 20
          curl -f http://$APP_IP:8080/

      - name: Success
        if: success()
        run: echo "Deployment Successful"

      - name: Failure
        if: failure()
        run: echo "Deployment Failed"
