name: Deploy Todo App

# Trigger pipeline on every push to main branch
on:
  push:
    branches: ["main"]

# Global environment variables (from GitHub Secrets)
env:
  APP_HOST: ${{ secrets.APP_HOST }}      # e.g. ubuntu@1.2.3.4
  APP_IP: ${{ secrets.APP_IP }}          # e.g. 1.2.3.4 (used for curl test)
  DEPLOY_DIR: ${{ secrets.DEPLOY_DIR }}  # e.g. /home/ubuntu/todo-app
  COMPOSE: ${{ secrets.COMPOSE }}        # e.g. docker compose or docker-compose

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # STEP 1: Get source code from GitHub repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # STEP 2: Basic backend test (Python compile check)
      # This ensures there are no syntax errors before deployment
      - name: Test Backend (Python Compile Check)
        run: |
          cd backend
          python3 -m py_compile $(find src -name "*.py")

      # STEP 3: Load SSH private key securely from GitHub Secrets
      - name: Setup SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.APP_SERVER_SSH_KEY }}

      # STEP 4: Add server to known hosts (prevents SSH prompt failure)
      # IMPORTANT: uses APP_HOST instead of hardcoded IP
      - name: Add Server to Known Hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${APP_HOST#*@} >> ~/.ssh/known_hosts

      # STEP 5: Create deployment directory on server
      - name: Prepare Remote Server Directory
        run: |
          ssh ${APP_HOST} "mkdir -p ${DEPLOY_DIR}"

      # STEP 6: Sync project files to server using rsync
      # Excludes unnecessary files like venv and git history
      - name: Sync Project Files to Server
        run: |
          rsync -az --delete \
            --exclude venv \
            --exclude .git \
            ./ ${APP_HOST}:${DEPLOY_DIR}/

      # STEP 7: Copy environment variables file securely
      - name: Upload Environment File (.env)
        run: |
          echo "${{ secrets.TODO_ENV }}" > .env
          scp .env ${APP_HOST}:${DEPLOY_DIR}/.env
          rm .env

      # STEP 8: Start / restart Docker containers on server
      - name: Deploy with Docker Compose
        run: |
          ssh ${APP_HOST} "
            cd ${DEPLOY_DIR} &&
            ${COMPOSE} up -d --build &&
            ${COMPOSE} ps
          "

      # STEP 9: Wait and check if app is actually running
      - name: Smoke Test (Basic Health Check)
        run: |
          echo "Waiting for app to start..."
          sleep 20

          code=$(curl -s -o /dev/null -w "%{http_code}" http://${APP_IP}:8080/)
          echo "Response code: $code"

          # Fail pipeline if app is not reachable
          if [ "$code" != "200" ]; then
            echo "❌ App is not working"
            exit 1
          fi

      # STEP 10: Success message
      - name: Deployment Success
        if: success()
        run: echo "✅ Deployment successful! App running at http://${APP_IP}:8080/"

      # STEP 11: Failure message
      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment failed. Check logs above."
